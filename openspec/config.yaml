# openspec/config.yaml
# Auto-generated by sdd-init for DocFlow project
schema: spec-driven

context: |
  Tech stack: PNPM + Turborepo monorepo | Next.js 16 (App Router) + Tailwind CSS v4 +
    Zustand | TypeScript strict mode + tsup (ESM + CJS) | pdfkit
  Architecture: JSON AST as universal document format; UI (Zustand) → JSON AST → Parser →
    Adapter (pdfkit/html) → Output file. Core engine and UI are fully separated.
  Testing: Vitest v3 (packages/core), Playwright v1.60 + @axe-core/playwright
    (apps/web-builder e2e + a11y). Coverage thresholds: lines 90%, functions 90%,
    branches 85%, statements 90%.
  Style: TypeScript strict mode with exactOptionalPropertyTypes, noUncheckedIndexedAccess,
    noImplicitOverride, noPropertyAccessFromIndexSignature. ESLint v9 (eslint-config-next).
    Prettier v3 for formatting. Conventional commits.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    rules:
      - Follow existing code patterns
    tdd: true
    test_command: "pnpm --filter core test"
  verify:
    test_command: "pnpm test"
    e2e_command: "pnpm test:e2e"
    build_command: "pnpm build"
    coverage_threshold: 85
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runners:
    - name: Vitest
      scope: packages/core
      command: "pnpm --filter core test"
      watch: "pnpm --filter core test:watch"
      coverage: "pnpm --filter core test:coverage"
      layers:
        unit: true
        integration: false
        e2e: false
      coverage_provider: "@vitest/coverage-v8"
      coverage_thresholds:
        lines: 90
        functions: 90
        branches: 85
        statements: 90
    - name: Playwright
      scope: apps/web-builder
      command: "pnpm --filter web-builder test:e2e"
      layers:
        unit: false
        integration: false
        e2e: true
      a11y: true

quality:
  linter: "pnpm lint"
  linter_framework: "ESLint v9 (eslint-config-next)"
  type_checker: "pnpm typecheck"
  type_checker_framework: "TypeScript strict mode (tsc --noEmit)"
  formatter: "pnpm format"
  formatter_framework: "Prettier v3"
